openapi: 3.0.3
info:
  title: BT Proxy API
  description: >
    HTTP API exposed by the BT Proxy Android app to interact with connected
    Bluetooth Low Energy devices. The server runs locally on the Android device
    (default port 8080). Authenticated endpoints require the header `X-BtProxy`
    with the configured auth token.
  version: "1.0"

servers:
  - url: "http://{host}:{port}"
    variables:
      host:
        default: "192.168.1.x"
        description: IP address of the Android device on the local network
      port:
        default: "8080"
        description: Port configured in the BT Proxy settings

components:
  securitySchemes:
    BtProxyToken:
      type: apiKey
      in: header
      name: X-BtProxy
      description: Auth token configured in the BT Proxy settings (default "secret")

  responses:
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        text/plain:
          schema:
            type: string
          example: "ERROR: Invalid authentication token"

    NotFound:
      description: Device not connected
      content:
        text/plain:
          schema:
            type: string
          example: "ERROR: Device not connected"

    InternalServerError:
      description: Internal server error
      content:
        text/plain:
          schema:
            type: string
          example: "ERROR: <message>"

paths:

  /ping:
    get:
      summary: Ping
      description: Simple liveness check. No authentication required.
      operationId: ping
      tags: [Public]
      responses:
        "200":
          description: Server is alive
          content:
            text/plain:
              schema:
                type: string
              example: "pong"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /simple:
    get:
      summary: Simple status text
      description: Returns a human-readable message confirming the server is running. No authentication required.
      operationId: simple
      tags: [Public]
      responses:
        "200":
          description: Server running message
          content:
            text/plain:
              schema:
                type: string
              example: "BT Proxy Server is running on port 8080"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /health:
    get:
      summary: Health check
      description: Returns server health and the number of currently connected BLE devices. No authentication required.
      operationId: health
      tags: [Public]
      responses:
        "200":
          description: Health status
          content:
            text/plain:
              schema:
                type: string
              example: |
                status: healthy
                server: running
                connected_devices_count: 2
                timestamp: 1711532400000
        "500":
          $ref: "#/components/responses/InternalServerError"

  /test:
    get:
      summary: Endpoint listing
      description: Returns a plain-text list of all available public and authenticated endpoints. No authentication required.
      operationId: test
      tags: [Public]
      responses:
        "200":
          description: Endpoint listing
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/InternalServerError"

  /status:
    get:
      summary: Server status
      description: Returns server status and the MAC addresses of all connected BLE devices. No authentication required.
      operationId: status
      tags: [Public]
      responses:
        "200":
          description: Server status with connected device list
          content:
            text/plain:
              schema:
                type: string
              example: |
                status: running
                connected_devices:
                AA:BB:CC:DD:EE:FF
                11:22:33:44:55:66
        "500":
          $ref: "#/components/responses/InternalServerError"

  /devices:
    get:
      summary: List connected devices
      description: Returns a newline-separated list of MAC addresses of all currently connected BLE devices. Empty body if no devices are connected. No authentication required.
      operationId: getDevices
      tags: [Public]
      responses:
        "200":
          description: Newline-separated MAC address list (empty if none)
          content:
            text/plain:
              schema:
                type: string
              example: |
                AA:BB:CC:DD:EE:FF
                11:22:33:44:55:66
        "500":
          $ref: "#/components/responses/InternalServerError"

  /{macAddress}/{characteristicUuid}:
    get:
      summary: Read BLE characteristic
      description: Reads the value of a GATT characteristic from a connected BLE device. Returns the raw bytes as space-separated uppercase hex (e.g. `A0 81 D0`).
      operationId: readCharacteristic
      tags: [Authenticated]
      security:
        - BtProxyToken: []
      parameters:
        - name: macAddress
          in: path
          required: true
          description: MAC address of the BLE device (colon-separated, e.g. `AA:BB:CC:DD:EE:FF`)
          schema:
            type: string
            example: "AA:BB:CC:DD:EE:FF"
        - name: characteristicUuid
          in: path
          required: true
          description: UUID of the GATT characteristic
          schema:
            type: string
            example: "00002a37-0000-1000-8000-00805f9b34fb"
      responses:
        "200":
          description: Space-separated hex bytes of the characteristic value
          content:
            text/plain:
              schema:
                type: string
              example: "A0 81 D0"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      summary: Write BLE characteristic
      description: >
        Writes a value to a GATT characteristic of a connected BLE device.
        The request body must be a string of space-separated uppercase hex bytes,
        e.g. `A0 81 D0`.
      operationId: writeCharacteristic
      tags: [Authenticated]
      security:
        - BtProxyToken: []
      parameters:
        - name: macAddress
          in: path
          required: true
          description: MAC address of the BLE device (colon-separated, e.g. `AA:BB:CC:DD:EE:FF`)
          schema:
            type: string
            example: "AA:BB:CC:DD:EE:FF"
        - name: characteristicUuid
          in: path
          required: true
          description: UUID of the GATT characteristic
          schema:
            type: string
            example: "00002a37-0000-1000-8000-00805f9b34fb"
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
              description: Space-separated hex bytes to write
              example: "A0 81 D0"
      responses:
        "200":
          description: Write successful
          content:
            text/plain:
              schema:
                type: string
              example: "OK"
        "400":
          description: Invalid data format
          content:
            text/plain:
              schema:
                type: string
              example: "ERROR: Invalid data format. Use space-separated hex bytes (e.g., 'A0 81 D0')"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
